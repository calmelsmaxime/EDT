name: Filtrage Calendrier ICS

on:
  schedule:
    # Correspond à 06:00, 12:00, 17:00 et 20:00 (Heure de Paris - UTC+2)
    - cron: '0 4,10,15,18 * * *'
  workflow_dispatch:

jobs:
  update-ics:
    runs-on: ubuntu-latest
    permissions:
      contents: write # Droit strict pour pouvoir pusher le fichier généré
    env:
      FORCE_JAVASCRIPT_ACTIONS_TO_NODE24: true # Anticipation de la dépréciation Node 20

    steps:
      - name: Checkout du code
        uses: actions/checkout@v4

      - name: Setup Python
        uses: actions/setup-python@v5
        with:
          python-version: '3.12'

      - name: Exécution du filtrage
        run: python filter_ics.py

      - name: Commit et Push (si modification)
        run: |
          git config --global user.name "github-actions[bot]"
          git config --global user.email "github-actions[bot]@users.noreply.github.com"
          git add edt_propre.ics
          
          # Vérifie si le fichier a réellement changé
          if ! git diff --staged --quiet; then
            git commit -m "Auto-update : Synchronisation de l'emploi du temps"
            # Synchronisation forcée avec la branche distante avant de pousser
            git pull --rebase origin main
            git push origin main
          else
            echo "Aucune modification détectée dans l'emploi du temps. Skip."
          fi
